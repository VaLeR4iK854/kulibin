name: kulibin

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kulibin_default

  tools:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    env_file: .env
    profiles: [tools]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kulibin_default

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kulibin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-kulibin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kulibin} -d ${POSTGRES_DB:-kulibin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - kulibin_default

volumes:
  postgres_data:
  uploads:

networks:
  kulibin_default:
    driver: bridge
